[build]
  publish = "."

[[redirects]]
  from = "http://lstpro.ru/*"
  to = "https://lstpro.ru/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.lstpro.ru/*"
  to = "https://lstpro.ru/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.lstpro.ru/*"
  to = "https://lstpro.ru/:splat"
  status = 301
  force = true

# Служебные файлы деплоя не публикуем, пока сайт ещё на Netlify
[[redirects]]
  from = "/deploy/*"
  to = "/404.html"
  status = 404
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'sha256-Du+OJKJSbdUgz5nrHeWWINvez6XKDDU/tyj/5c2uvwo='; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
