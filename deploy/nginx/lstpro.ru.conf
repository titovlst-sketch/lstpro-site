# Сайт lstpro.ru — статика + обработчик формы заявки
#
# Установка: /etc/nginx/sites-available/lstpro.ru.conf + симлинк в sites-enabled
# (setup-server.sh делает это сам). Файл написан для HTTP; TLS-блоки и редирект
# на https добавляет certbot: sudo certbot --nginx --redirect -d lstpro.ru -d www.lstpro.ru

server {
    listen 80;
    listen [::]:80;
    server_name www.lstpro.ru;
    return 301 https://lstpro.ru$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name lstpro.ru;

    root /var/www/lstpro;
    index index.html;
    charset utf-8;

    include snippets/lstpro-headers.conf;

    error_page 404 /404.html;

    gzip on;
    gzip_types text/css text/javascript application/javascript image/svg+xml text/xml application/xml text/plain;
    gzip_min_length 512;

    # Кэш статики на год (как на Netlify)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        include snippets/lstpro-headers.conf;
        try_files $uri =404;
    }

    # Обработчик формы (systemd-сервис lstpro-form на 127.0.0.1:8300)
    location = /api/request {
        proxy_pass http://127.0.0.1:8300;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Форма исторически постит на /success.html (наследие Netlify Forms):
    # POST уходит в обработчик, GET отдаёт обычную страницу успеха
    location = /success.html {
        if ($request_method = POST) {
            proxy_pass http://127.0.0.1:8300;
        }
        try_files $uri =404;
    }

    # Служебные файлы репозитория не отдаём
    location ~ ^/(deploy/|\.git|\.github|README\.md|netlify\.toml|\.gitattributes) {
        return 404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
